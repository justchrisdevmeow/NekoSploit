name: Build NekoSploit

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Configure CMake
        run: cmake -B build -S .
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NekoSploit
          path: |
            build/bin/Release/neko_injector.exe
            build/bin/Release/nekosploit.dll
